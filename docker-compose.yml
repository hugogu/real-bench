services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d bench"]
      interval: 2s
      timeout: 2s
      retries: 15

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      DATABASE_URL: postgresql://bench:bench@db:5432/bench
      APP_SECRET: compose-runtime-secret-with-32-characters
    ports:
      - "${WEB_PORT:-3100}:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 2s
      timeout: 2s
      retries: 20
